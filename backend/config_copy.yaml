# Eye Tracking Debugger Configuration
# Copy this file to config.yaml and customize as needed

# Signal Processing Layer
signal_processing:
    input_sampling_rate_hz: 90.0
    window_length_seconds: 1.0
    window_overlap_ratio: 0.5
    output_frequency_hz: 2.0
    enabled_metrics:
        - fixation_duration
        - saccade_amplitude
        - pupil_diameter
        - blink_rate
        - data_quality
        - ipi
    min_valid_sample_ratio: 0.5
    interpolate_missing: true
    max_gap_to_interpolate_ms: 100.0
    require_both_eyes_valid: false

# Forecasting Tool (proactive mode only)
forecasting:
    enabled: true
    prediction_horizon_seconds: 10.0
    update_rate_hz: 5.0
    model_path: backend/models/trained/latest.json
    model_type: xgboost
    history_window_seconds: 30.0
    min_confidence_threshold: 0.5

# Training Configuration (for offline model training)
training:
    data_path: null # Path to processed features parquet file

    # With 1s windows at 50% overlap, windows arrive every 0.5s
    # history_window_size=120 means 120 × 0.5s = 60 seconds of history
    history_window_size: 60 # Number of past windows as input
    prediction_horizon: 20 # Windows to look ahead (~30 seconds)
    train_ratio: 0.7
    val_ratio: 0.15
    test_ratio: 0.15

    # XGBoost hyperparameters
    n_estimators: 1000
    max_depth: 4
    learning_rate: 0.03 # Current tuned value
    early_stopping_rounds: 50
    random_state: 42

# Reactive Tool
reactive_tool:
    window_size_seconds: 3.0
    model_type: rule_based # rule_based, ml_classifier, sequence_model
    model_path: null
    thresholds:
        high_load: 0.7
        medium_load: 0.4
        low_load: 0.2
    score_smoothing_factor: 0.3
    min_confidence_for_action: 0.475

# Feedback Layer
feedback_layer:
    llm_provider: development # openai, anthropic, development (no LLM-calls)
    llm_model: gpt-4.1-mini
    llm_api_key: sk-proj
    max_feedback_items: 1
    max_message_length: 200
    enable_cache: true
    cache_ttl_seconds: 300.0
    max_generations_per_minute: 50
    max_tokens: 500
    temperature: 0.3

# Runtime Controller
controller:
    operation_mode: control # reactive, proactive, control
    feedback_cooldown_seconds: 60.0
    min_score_for_feedback: 0.5
    calibration_duration_seconds: 45.0
    websocket_host: localhost
    websocket_port: 8765
    api_host: localhost
    api_port: 8080
    log_level: INFO
    log_to_file: true
    log_file_path: logs/eye_tracking_debugger.log
    experiment_id: null
    participant_id: null

# Eye Tracker
eye_tracker:
    mode: TOBII_REPLAY # SIMULATED, TOBII or REPLAY
    filepath: logs/record/2026-03-28_21-59-06_RECORD.tsv # Required if mode is REPLAY, path to recorded data file
    device_id: null # null for auto-select, or specific device serial/address
    batch_size: 12 # Number of samples per batch (default 12 for ~120Hz)
    flush_interval_ms: 16 # Max time between flushes in milliseconds
    simulated_sampling_rate_hz: 90.0 # Sampling rate for simulated mode
